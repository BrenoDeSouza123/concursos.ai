version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: concursos-ai-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: concursos
    ports:
      # Mapeia a porta interna 5432 para a sua 51214 local configurada no .env
      - "51214:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
